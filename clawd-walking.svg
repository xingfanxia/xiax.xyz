<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .body-anim {
        animation: body-bob 1s infinite linear;
      }
      .leg-a {
        animation: leg-a 1s infinite linear;
      }
      .leg-b {
        animation: leg-b 1s infinite linear;
      }
      .arm-l {
        animation: arm-l 1s infinite linear;
      }
      .arm-r {
        animation: arm-r 1s infinite linear;
      }
      .eyes-anim {
        transform-origin: 7.5px 9px;
        animation: eyes-look-blink 4s infinite linear;
      }

      @keyframes body-bob {
        0%, 100% { transform: translate(0px, 1px); }
        25%      { transform: translate(0px, 0px); }
        50%      { transform: translate(0px, 1px); }
        75%      { transform: translate(0px, 0px); }
      }

      @keyframes leg-a {
        0%, 100% { transform: translate(-2px, 0px); }
        25%      { transform: translate(0px, 0px); }
        50%      { transform: translate(2px, 0px); }
        75%      { transform: translate(0px, -2px); }
      }

      @keyframes leg-b {
        0%, 100% { transform: translate(2px, 0px); }
        25%      { transform: translate(0px, -2px); }
        50%      { transform: translate(-2px, 0px); }
        75%      { transform: translate(0px, 0px); }
      }

      @keyframes arm-l {
        0%, 50%, 100% { transform: translate(0px, 0px); }
        25%           { transform: translate(0px, -1px); }
        75%           { transform: translate(0px, 1px); }
      }

      @keyframes arm-r {
        0%, 50%, 100% { transform: translate(0px, 0px); }
        25%           { transform: translate(0px, 1px); }
        75%           { transform: translate(0px, -1px); }
      }

      @keyframes eyes-look-blink {
        0%, 48%, 52%, 100% { transform: translate(-2px, 0px) scaleY(1); }
        50%                { transform: translate(-2px, 0px) scaleY(0.1); }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <!-- Animated Legs -->
  <g id="legs" fill="#DE886D">
    <g class="leg-a">
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
    </g>
    <g class="leg-b">
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
    </g>
    <g class="leg-a">
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
    </g>
    <g class="leg-b">
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
    </g>
  </g>

  <!-- Animated Upper Body -->
  <g class="body-anim">
    <!-- Body Color Group -->
    <g fill="#DE886D">
      <rect id="torso" x="2" y="6" width="11" height="7"/>
      <g class="arm-l">
        <rect id="left-arm" x="0" y="9" width="2" height="2"/>
      </g>
      <g class="arm-r">
        <rect id="right-arm" x="13" y="9" width="2" height="2"/>
      </g>
    </g>

    <!-- Eyes Color Group -->
    <g class="eyes-anim" fill="#000000">
      <rect id="left-eye" x="4" y="8" width="1" height="2"/>
      <rect id="right-eye" x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
